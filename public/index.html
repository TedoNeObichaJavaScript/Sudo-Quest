<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sudo quest — Learn to Code</title>
  <meta name="description" content="Learn programming syntax interactively, one command at a time. Master JavaScript and Git fundamentals through hands-on challenges.">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨️</text></svg>">
</head>
<body>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">sudo quest</h1>
        <span class="version">v2.0</span>
      </div>
      <div class="header-center">
        <span id="category-display" class="category-badge">Basics</span>
      </div>
      <div class="header-right">
        <span id="level-indicator" class="level-text">Level 1/30</span>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Timer Sidebar -->
      <aside class="timer-sidebar" id="timer-sidebar">
        <div class="timer-header">
          <span class="timer-title">sudo quest</span>
          <span class="timer-subtitle">Task Completion</span>
        </div>
        <div class="splits-list" id="splits-list">
          <!-- Splits populated by JS -->
        </div>
        <div class="timer-footer">
          <div class="timer-clock" id="timer-clock">0:00.00</div>
          <div class="timer-segment">
            <span class="segment-label">Current Level</span>
            <span class="segment-time" id="segment-time">0:00.00</span>
          </div>
        </div>
      </aside>

      <!-- Terminal -->
      <main class="terminal">
        <div class="terminal-bar">
          <div class="terminal-dots">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <span class="terminal-title">user@sudoquest:~$</span>
        </div>

        <div id="output" class="terminal-output"></div>

        <div class="terminal-input-area">
          <span class="prompt">$</span>
          <textarea
            id="input"
            rows="1"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            autofocus
            placeholder="Type your code here... (Shift+Enter for new line)"
          ></textarea>
          <button id="run-btn" class="run-btn">RUN</button>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Type <strong>help</strong> for commands</span>
      <span>•</span>
      <span>Type <strong>hint</strong> when stuck</span>
    </footer>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
